<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kinder Speech Therapy Portal</title>
    <meta name="description"
        content="Secure login to your Kinderly speech therapy account. Access your child's progress tracking, session schedule, and therapy resources.">
    <meta name="keywords" content="login, portal, therapy account, patient login">
    <meta name="robots" content="noindex, follow">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" id="rtlStyle" href="assets/css/rtl.css" disabled>
    <style>
        body {
            min-height: 100vh;
            background-color: var(--bg-color);
            overflow-x: hidden;
            position: relative;
        }

        .login-glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 32px;
            width: 100%;
            max-width: 450px;
            padding: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: glassReveal 1s ease-out;
        }

        [data-bs-theme="dark"] .login-glass {
            background: rgba(18, 18, 18, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        @keyframes glassReveal {
            0% {
                opacity: 0;
                transform: scale(0.9);
                filter: blur(10px);
            }

            100% {
                opacity: 1;
                transform: scale(1);
                filter: blur(0);
            }
        }

        .d-none-dark {
            display: inline-block;
        }

        .d-inline-dark {
            display: none;
        }

        [data-bs-theme="dark"] .d-none-dark {
            display: none;
        }

        [data-bs-theme="dark"] .d-inline-dark {
            display: inline-block;
        }

        [data-bs-theme="dark"] .bg-white {
            background-color: var(--bs-body-bg) !important;
        }

        .btn-primary {
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: var(--secondary-color) !important;
            border-color: var(--secondary-color) !important;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 184, 0, 0.3);
        }

        .theme-toggle-btn {
            background: white !important;
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: var(--primary-color) !important;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        [data-bs-theme="dark"] .theme-toggle-btn {
            background: #1e1e1e !important;
            border-color: rgba(255, 255, 255, 0.1);
            color: #BBBBBB !important;
        }

        .theme-toggle-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        /* Dark mode inputs enhancement */
        [data-bs-theme="dark"] .form-control {
            background-color: rgba(255, 255, 255, 0.05) !important;
            border-color: rgba(255, 255, 255, 0.1) !important;
            color: #ffffff !important;
        }

        [data-bs-theme="dark"] .input-group-text {
            background-color: rgba(255, 255, 255, 0.1) !important;
            border-color: rgba(255, 255, 255, 0.1) !important;
            color: #ffffff !important;
        }

        /* Eye icon toggle button */
        .password-toggle {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0 0.75rem;
            color: #6c757d;
            display: flex;
            align-items: center;
            transition: color 0.2s ease;
        }
        .password-toggle:hover { color: var(--primary-color); }
        [data-bs-theme="dark"] .password-toggle { color: #aaa; }
        [data-bs-theme="dark"] .password-toggle:hover { color: var(--primary-color); }

        /* Mobile: stack remember me / forgot password */
        @media (max-width: 575.98px) {
            .remember-forgot {
                flex-direction: column !important;
                align-items: flex-start !important;
                gap: 0.5rem !important;
            }
        }
    </style>
</head>

<body>
    <!-- Decorative Background Shapes -->
    <div class="decorative-bg">
        <svg class="deco-shape float-slow" width="120" height="120" viewBox="0 0 24 24"
            style="top: 10%; left: -2%; color: var(--primary-color);">
            <path fill="currentColor"
                d="M12 1L14.39 8.26H22L15.81 12.75L18.19 20L12 15.5L5.81 20L8.19 12.75L2 8.26H9.61L12 1Z" />
        </svg>
        <svg class="deco-shape float-slow-reverse" width="80" height="80" viewBox="0 0 24 24"
            style="top: 40%; right: -1%; color: var(--secondary-color);">
            <path fill="currentColor"
                d="M12 21.35L10.55 20.03C5.4 15.36 2 12.27 2 8.5C2 5.41 4.41 3 7.5 3C9.24 3 10.91 3.81 12 5.08C13.09 3.81 14.76 3 16.5 3C19.59 3 22 5.41 22 8.5C22 12.27 18.6 15.36 13.45 20.03L12 21.35Z" />
        </svg>
        <svg class="deco-shape float-slow" width="150" height="150" viewBox="0 0 24 24"
            style="bottom: 5%; left: 5%; color: var(--accent-color);">
            <path fill="currentColor"
                d="M17.5 19C15.01 19 13 16.99 13 14.5C13 14.36 13.01 14.23 13.03 14.1C12.7 14.04 12.35 14 12 14C9.24 14 7 11.76 7 9C7 6.24 9.24 4 12 4C14.31 4 16.25 5.56 16.8 7.69C17.03 7.62 17.26 7.59 17.5 7.59C19.43 7.59 21 9.16 21 11.09C21 11.85 20.76 12.55 20.35 13.13C20.75 13.75 21 14.47 21 15.25C21 17.32 19.43 19 17.5 19Z" />
        </svg>
    </div>

    <!-- Floating Decorative Elements -->
    <div class="floating-element icon-sun d-none d-lg-block" style="top: 15%; left: 10%; width: 60px;">
        <svg viewBox="0 0 100 100" class="w-100">
            <circle cx="50" cy="50" r="20" fill="var(--accent-color)" />
            <g stroke="var(--accent-color)" stroke-width="6" stroke-linecap="round">
                <line x1="50" y1="10" x2="50" y2="25" />
                <line x1="50" y1="75" x2="50" y2="90" />
                <line x1="10" y1="50" x2="25" y2="50" />
                <line x1="75" y1="50" x2="90" y2="50" />
            </g>
        </svg>
    </div>
    <div class="floating-element icon-blocks d-none d-lg-block" style="bottom: 15%; right: 10%; width: 80px;">
        <svg viewBox="0 0 100 100" class="w-100">
            <rect x="10" y="40" width="30" height="30" rx="4" fill="var(--primary-color)" />
            <rect x="45" y="40" width="30" height="30" rx="4" fill="var(--secondary-color)" />
            <rect x="27.5" y="10" width="30" height="30" rx="4" fill="var(--accent-color)" />
        </svg>
    </div>


    <section class="min-vh-100 d-flex align-items-center py-5 overflow-hidden">
        <div class="container d-flex flex-column align-items-center px-4">
            <!-- Static Toggles Above the Box -->
            <div class="d-flex justify-content-end gap-2 mb-3 w-100" style="max-width: 450px;">
                <button class="btn btn-sm rounded-circle theme-toggle-btn theme-toggle" id="themeToggle"
                    title="Toggle Theme">
                    <i class="bi bi-sun d-none-dark"></i>
                    <i class="bi bi-moon d-inline-dark"></i>
                </button>
                <button class="btn btn-sm rounded-circle theme-toggle-btn" id="rtlToggle" title="Toggle RTL">
                    <i class="bi bi-arrow-left-right"></i>
                </button>
            </div>
            <div class="login-glass">
                <div class="text-center mb-4">
                    <a href="index.html" class="navbar-brand justify-content-center mb-3">
                        <img src="assets/images/logo.svg" alt="Kinderly Logo" height="45">
                    </a>
                    <h3 class="fw-bold mb-1">Welcome <span class="text-gradient">Back</span></h3>

                </div>

                <form class="needs-validation" novalidate id="loginForm">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-dark-emphasis">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 rounded-start-3"><i
                                    class="bi bi-envelope text-muted"></i></span>
                            <input type="email"
                                class="form-control border-start-0 py-2 shadow-none rounded-end-3 bg-light"
                                placeholder="Email" required>
                            <div class="invalid-feedback">Please enter a valid email address.</div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-dark-emphasis">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 rounded-start-3"><i
                                    class="bi bi-lock text-muted"></i></span>
                            <input type="password" id="loginPassword"
                                class="form-control border-start-0 border-end-0 py-2 shadow-none bg-light"
                                placeholder="Password" required minlength="6">
                            <button type="button" class="password-toggle input-group-text bg-light border-start-0 rounded-end-3" id="toggleLoginPassword" aria-label="Toggle password visibility">
                                <i class="bi bi-eye" id="toggleLoginIcon"></i>
                            </button>
                            <div class="invalid-feedback">Password is required (min 6 characters).</div>
                        </div>
                    </div>

                    <!-- Remember & Forgot - stacked on mobile, inline on larger screens -->
                    <div class="d-flex justify-content-between align-items-center mb-4 remember-forgot">
                        <div class="form-check mb-0">
                            <input class="form-check-input" type="checkbox" id="remember">
                            <label class="form-check-label small" for="remember">Remember me</label>
                        </div>
                        <a href="#" class="text-primary small text-decoration-none fw-medium">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 fs-6 rounded-3 shadow-sm mb-4">Login to
                        Account</button>

                    <div class="position-relative mb-4">
                        <hr class="text-secondary opacity-25">
                        <span
                            class="position-absolute top-50 start-50 translate-middle bg-white px-3 small text-secondary text-nowrap">or
                            connect with</span>
                    </div>

                    <div class="row g-2 mb-4 justify-content-center">
                        <div class="col-12 col-sm-6">
                            <button
                                class="btn btn-outline-secondary w-100 h-100 py-2 d-flex align-items-center justify-content-center gap-2 small rounded-3">
                                <img src="https://www.google.com/favicon.ico" height="16" alt="Google"> Google
                            </button>
                        </div>
                        <div class="col-12 col-sm-6">
                            <button
                                class="btn btn-outline-secondary w-100 h-100 py-2 d-flex align-items-center justify-content-center gap-2 small rounded-3">
                                <i class="bi bi-facebook" style="color: #1877F2 !important;"></i> Facebook
                            </button>
                        </div>
                        <div class="col-12 col-sm-6">
                            <button
                                class="btn btn-outline-secondary w-100 h-100 py-2 d-flex align-items-center justify-content-center gap-2 small rounded-3">
                                <i class="bi bi-apple fs-6"></i> Apple
                            </button>
                        </div>
                    </div>

                    <p class="text-center small text-secondary mb-0">
                        Don't have an account? <a href="register.html"
                            class="text-primary fw-bold text-decoration-none">Register</a>
                    </p>
                </form>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Simple theme apply based on localStorage for 100vh pages -->
    <script>
        // Password Toggle
        document.getElementById('toggleLoginPassword').addEventListener('click', function () {
            const input = document.getElementById('loginPassword');
            const icon = document.getElementById('toggleLoginIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        });

        // Theme Logic
        const themeToggle = document.getElementById('themeToggle');
        const storedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', storedTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-bs-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });

        // RTL Logic
        const rtlToggle = document.getElementById('rtlToggle');
        const rtlStyle = document.getElementById('rtlStyle');
        let isRTL = localStorage.getItem('rtl') === 'true';

        function updateRTL(enabled) {
            document.documentElement.dir = enabled ? 'rtl' : 'ltr';
            rtlStyle.disabled = !enabled;
            localStorage.setItem('rtl', enabled);
        }
        updateRTL(isRTL);

        rtlToggle.addEventListener('click', () => {
            isRTL = !isRTL;
            updateRTL(isRTL);
        });

        // Form Validation Logic
        (function () {
            'use strict'
            const form = document.getElementById('loginForm')
            form.addEventListener('submit', function (event) {
                if (!form.checkValidity()) {
                    event.preventDefault()
                    event.stopPropagation()
                } else {
                    event.preventDefault()
                    window.location.href = 'dashboard.html'
                }
                form.classList.add('was-validated')
            }, false)
        })()
    </script>
</body>

</html>
