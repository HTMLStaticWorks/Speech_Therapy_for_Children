<svg width="250" height="60" viewBox="0 0 250 60" xmlns="http://www.w3.org/2000/svg">
    <!-- Star/Sparkle Cluster -->
    <g transform="translate(10, 8)">
        <!-- Large Sparkle -->
        <path d="M20,0 Q20,20 40,20 Q20,20 20,40 Q20,20 0,20 Q20,20 20,0 Z" fill="#FFB800" />
        <!-- Medium Sparkle -->
        <path d="M10,30 Q10,37 17,37 Q10,37 10,44 Q10,37 3,37 Q10,37 10,30 Z" fill="#ffb800" />
        <!-- Small Sparkle -->
        <path d="M42,25 Q42,32 49,32 Q42,32 42,39 Q42,32 35,32 Q42,32 42,25 Z" fill="#FF577B" />
        <!-- Tiny Sparkle -->
        <circle cx="5" cy="15" r="2.5" fill="#9D4EDD" />
        <circle cx="38" cy="8" r="2" fill="#FF577B" />
    </g>
    
    <!-- Text: Kinder -->
    <!-- Font using standard rounded / bold fallbacks for a playful look -->
    <text x="70" y="42" font-family="'Comic Sans MS', 'Nunito', 'Segoe UI', 'Baloo 2', 'Quicksand', sans-serif" font-weight="900" font-size="34" letter-spacing="-0.5">
        <tspan fill="#FF577B">K</tspan>
        <tspan fill="#FF8A00">i</tspan>
        <tspan fill="#FFB800">n</tspan>
        <tspan fill="#ffb800">d</tspan>
        <tspan fill="#FF577B">e</tspan>
        <tspan fill="#9D4EDD">r</tspan>
    </text>
</svg>
